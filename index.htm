<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <meta name="theme-color" content="#1e1e1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Servo">
  <meta name="description" content="Elmot Smart Servo — browser-based servo configuration via WebUSB">
  <title>Elmot Smart Servo</title>
  <link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Elmot Smart Servo&quot;,&quot;short_name&quot;:&quot;Servo&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23ffffff&quot;,&quot;theme_color&quot;:&quot;%231e1e1e&quot;,&quot;icons&quot;:[]}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23333'/><circle cx='50' cy='50' r='8' fill='%230f0'/><line x1='50' y1='50' x2='50' y2='15' stroke='%230f0' stroke-width='4'/></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 1em; -webkit-tap-highlight-color: transparent; }

    .header { display: flex; align-items: baseline; gap: 0.8em; margin-bottom: 0.3em; }
    .header h1 { margin: 0; font-size: 1.3em; white-space: nowrap; }
    #status { color: #555; font-size: 0.9em; }

    /* ---- Buttons: flex wrap ---- */
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.3em; margin-bottom: 0.5em; }
    button { font-size: 0.9em; padding: 0.5em 1em; border-radius: 6px; border: 1px solid #999; background: #f5f5f5; touch-action: manipulation; cursor: pointer; white-space: nowrap; }
    button:active { background: #ddd; }
    button:disabled { opacity: 0.4; }


    /* ---- Main layout ---- */
    .main { display: flex; gap: 1em; }
    .params-col { flex: 1; min-width: 0; }
    #logBox {
      width: 30%; min-width: 200px; max-height: calc(100vh - 6em); overflow-y: auto;
      background: #1e1e1e; color: #0f0;
      font-family: monospace; font-size: 0.8em;
      padding: 0.5em; border-radius: 6px;
      white-space: pre; word-break: break-all;
    }
    #logBox.collapsed { display: none; }

    .controls { opacity: 0.4; pointer-events: none; }
    .controls.active { opacity: 1; pointer-events: auto; }

    /* ---- SVG + angle sliders side by side ---- */
    .angle-section { display: flex; gap: 1em; align-items: flex-start; flex-wrap: wrap; }
    .angle-section svg { flex-shrink: 0; }
    .slider-group { flex: 1; min-width: 200px; }

    /* ---- Slider rows ---- */
    .slider-row { display: flex; align-items: center; margin: 0.3em 0; gap: 0.4em; }
    .slider-row label { min-width: 7em; text-align: right; font-size: 0.85em; flex-shrink: 0; }
    .slider-row input[type=range] { flex: 1; min-width: 80px; height: 1.8em; touch-action: manipulation; }
    .slider-row .val { min-width: 2.5em; text-align: right; font-family: monospace; font-size: 0.85em; }
    .slider-row .unit { font-size: 0.8em; color: #666; }

    h3 { margin: 0.8em 0 0.2em; font-size: 1em; }

    .warning { color: #c00; font-weight: bold; font-size: 0.85em; min-height: 1.1em; }

    .check-row { margin: 0.3em 0; }
    .check-row label { font-size: 0.9em; }
    .check-row input[type=checkbox] { width: 2em; height: 2em; vertical-align: middle; }

    #logToggle { font-size: 0.8em; padding: 0.3em 0.8em; }

    /* ---- Portrait: stack vertically, log at bottom ---- */
    @media (max-width: 700px) {
      .header h1 { font-size: 1.1em; }
      .main { flex-direction: column; }
      #logBox { width: 100%; max-height: 15vh; font-size: 0.75em; }
      .angle-section { flex-direction: column; }
      .mock-row { display: flex; align-items: center; gap: 0.4em; flex-wrap: nowrap; }
      .mock-row .check-row { margin: 0; }
      .mock-row .slider-row { margin: 0; flex: 1; }
    }
  </style>
</head>
<body>
  <div class="header"><h1>Elmot Smart Servo</h1><span id="status">Not connected</span></div>
  <div class="toolbar">
    <button id="btnConnect">Connect</button>
    <button id="btnDisconnect" disabled>Disconnect</button>
    <button id="btnRestart" disabled>Restart</button>
    <button id="btnSave" disabled>Save to Flash</button>
    <button id="btnReset" disabled>Reset Defaults</button>
    <button id="logToggle">Log</button>
  </div>

  <div class="main">
    <div class="params-col">
      <div id="controls" class="controls">
        <div class="angle-section">
          <svg id="angleCircle" width="220" height="220" viewBox="0 0 260 260"></svg>
          <div class="slider-group">
            <h3 style="display:flex;align-items:center;gap:1em">Angle <label class="check-row" style="font-weight:normal;font-size:0.85em"><input type="checkbox" id="s_angle_reversed"> Reversed</label></h3>
            <div class="slider-row"><label>Zero restricted</label><input type="range" id="s_zero_restricted_angle" min="0" max="90" value="5"><span class="val" id="v_zero_restricted_angle">5</span><span class="unit">&deg;</span></div>
            <div class="slider-row"><label>Tolerance</label><input type="range" id="s_angle_tolerance" min="0" max="90" value="2"><span class="val" id="v_angle_tolerance">2</span><span class="unit">&deg;</span></div>
            <div class="slider-row"><label>Dead angle</label><input type="range" id="s_dead_angle" min="0" max="90" value="5"><span class="val" id="v_dead_angle">5</span><span class="unit">&deg;</span></div>
            <div class="slider-row"><label>Slow angle</label><input type="range" id="s_slow_angle" min="0" max="90" value="20"><span class="val" id="v_slow_angle">20</span><span class="unit">&deg;</span></div>
            <div class="warning" id="angleWarning"></div>
          </div>
        </div>

        <h3>Power</h3>
        <div class="slider-row"><label>Minimum</label><input type="range" id="s_cutoff_pwm" min="0" max="100" value="50"><span class="val" id="v_cutoff_pwm">50</span><span class="unit">%</span></div>
        <div class="slider-row"><label>Slow</label><input type="range" id="s_slow_pwm" min="0" max="100" value="70"><span class="val" id="v_slow_pwm">70</span><span class="unit">%</span></div>
        <div class="slider-row"><label>Full</label><input type="range" id="s_fast_pwm" min="0" max="100" value="100"><span class="val" id="v_fast_pwm">100</span><span class="unit">%</span></div>
        <div class="warning" id="powerWarning"></div>

        <h3>Timing</h3>
        <div class="slider-row"><label>Slow start</label><input type="range" id="s_slow_start_ms" min="0" max="1000" step="10" value="200"><span class="val" id="v_slow_start_ms">200</span><span class="unit">ms</span></div>

        <h3>PWM Input</h3>
        <div class="slider-row"><label>Low limit</label><input type="range" id="s_pwm_low_limit" min="900" max="2500" step="10" value="1200"><span class="val" id="v_pwm_low_limit">1200</span><span class="unit">&micro;s</span></div>
        <div class="slider-row"><label>High limit</label><input type="range" id="s_pwm_high_limit" min="900" max="2500" step="10" value="1700"><span class="val" id="v_pwm_high_limit">1700</span><span class="unit">&micro;s</span></div>
        <div class="slider-row"><label>Center</label><span class="val" id="v_pwm_center">1450</span><span class="unit">&micro;s</span><label style="min-width:4em">Range</label><span class="val" id="v_pwm_range">250</span><span class="unit">&micro;s</span></div>
        <div class="warning" id="pwmRangeWarning"></div>

        <div class="mock-row">
          <div class="check-row"><label><input type="checkbox" id="s_pwm_mock_enabled"> Mock PWM</label></div>
          <div class="slider-row"><label>Value</label><input type="range" id="s_pwm_mock" min="1000" max="2000" step="1" value="1500" disabled><span class="val" id="v_pwm_mock">1500</span><span class="unit">&micro;s</span></div>
        </div>
      </div>
    </div>
    <div id="logBox"></div>
  </div>

<script>
  const VID = 0xCAFE, PID = 0x4002;
  const VENDOR_REQUEST_PARAMS = 0x03;
  const VENDOR_REQUEST_REBOOT = 0x04;
  const VENDOR_REQUEST_SAVE   = 0x05;
  const INTERFACE = 0, EP_IN = 0x01, EP_OUT = 0x01;

  const SLIDER_FIELDS = [
    'zero_restricted_angle','angle_tolerance','dead_angle','slow_angle',
    'cutoff_pwm','slow_pwm','fast_pwm','slow_start_ms',
    'pwm_low_limit','pwm_high_limit'
  ];
  const ANGLE_FIELDS = ['zero_restricted_angle','angle_tolerance','dead_angle','slow_angle'];
  const POWER_FIELDS = ['cutoff_pwm','slow_pwm','fast_pwm'];
  const PWM_RANGE_FIELDS = ['pwm_low_limit','pwm_high_limit'];

  const DEFAULTS = {
    zero_restricted_angle: 5, angle_tolerance: 2, dead_angle: 5, slow_angle: 20,
    angle_reversed: 0,
    cutoff_pwm: 50, slow_pwm: 70, fast_pwm: 100, slow_start_ms: 200,
    pwm_low_limit: 1200, pwm_high_limit: 1700
  };

  const MAX_LOG_LINES = 500;
  let device = null, logLines = [], sendTimer = null;

  const statusEl = document.getElementById('status');
  const logBox = document.getElementById('logBox');
  const controlsEl = document.getElementById('controls');

  function setStatus(msg) { statusEl.textContent = msg; }

  function setConnected(on) {
    document.getElementById('btnConnect').disabled = on;
    document.getElementById('btnDisconnect').disabled = !on;
    document.getElementById('btnRestart').disabled = !on;
    document.getElementById('btnSave').disabled = !on;
    document.getElementById('btnReset').disabled = !on;
    controlsEl.classList.toggle('active', on);
  }

  /* ---- Text key=value protocol ---- */
  function parseParamsText(text) {
    const p = {};
    for (const line of text.split('\n')) {
      const eq = line.indexOf('=');
      if (eq < 0) continue;
      p[line.substring(0, eq).trim()] = line.substring(eq + 1).trim();
    }
    return p;
  }

  function buildParamsText() {
    let lines = [];
    for (const f of SLIDER_FIELDS) {
      lines.push(f + '=' + document.getElementById('s_' + f).value);
    }
    lines.push('angle_reversed=' + (document.getElementById('s_angle_reversed').checked ? '1' : '0'));
    const mock = document.getElementById('s_pwm_mock_enabled').checked
        ? document.getElementById('s_pwm_mock').value : '0';
    lines.push('pwm_mock=' + mock);
    return lines.join('\n') + '\n';
  }

  function populateFromMap(p) {
    if (p.version) setStatus('Connected, firmware v' + p.version);
    for (const f of SLIDER_FIELDS) {
      if (p[f] === undefined) continue;
      const s = document.getElementById('s_' + f);
      if (s) s.value = parseInt(p[f]);
      updateDisplay(f, parseInt(p[f]));
    }
    if (p.angle_reversed !== undefined)
      document.getElementById('s_angle_reversed').checked = (parseInt(p.angle_reversed) !== 0);
    if (p.pwm_mock !== undefined) {
      const val = parseInt(p.pwm_mock);
      document.getElementById('s_pwm_mock_enabled').checked = (val !== 0);
      document.getElementById('s_pwm_mock').disabled = (val === 0);
      if (val !== 0) {
        document.getElementById('s_pwm_mock').value = val;
        document.getElementById('v_pwm_mock').textContent = val;
      }
    }
    drawAngleCircle();
    checkAngleWarnings();
    checkPowerWarnings();
    checkPwmRangeWarning();
  }

  function updateDisplay(field, val) {
    const v = document.getElementById('v_' + field);
    if (v) v.textContent = val;
  }

  /* ---- SVG Circle ---- */
  function polarToXY(cx, cy, r, deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }

  function arcPath(cx, cy, r, startDeg, endDeg) {
    const [x1, y1] = polarToXY(cx, cy, r, startDeg);
    const [x2, y2] = polarToXY(cx, cy, r, endDeg);
    const large = (endDeg - startDeg > 180) ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
  }

  function drawAngleCircle() {
    const svg = document.getElementById('angleCircle');
    const cx = 130, cy = 130, r = 110;
    const zra = parseInt(document.getElementById('s_zero_restricted_angle').value);
    const tol = parseInt(document.getElementById('s_angle_tolerance').value);
    const dead = parseInt(document.getElementById('s_dead_angle').value);
    const slow = parseInt(document.getElementById('s_slow_angle').value);
    const target = 180;

    let html = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ccc" stroke-width="1"/>`;
    if (zra > 0) {
      html += `<path d="${arcPath(cx, cy, r, 360 - zra, 360)}" fill="none" stroke="red" stroke-width="8" opacity="0.5"/>`;
      html += `<path d="${arcPath(cx, cy, r, 0, zra)}" fill="none" stroke="red" stroke-width="8" opacity="0.5"/>`;
    }
    html += `<path d="${arcPath(cx, cy, r - 2, target - slow, target + slow)}" fill="none" stroke="#09f" stroke-width="12" opacity="0.25"/>`;
    html += `<path d="${arcPath(cx, cy, r - 2, target - dead, target + dead)}" fill="none" stroke="#fa0" stroke-width="12" opacity="0.4"/>`;
    html += `<path d="${arcPath(cx, cy, r - 2, target - tol, target + tol)}" fill="none" stroke="#0a0" stroke-width="12" opacity="0.5"/>`;
    const [tx, ty] = polarToXY(cx, cy, r - 20, target);
    html += `<line x1="${cx}" y1="${cy}" x2="${tx}" y2="${ty}" stroke="#333" stroke-width="2"/>`;
    html += `<circle cx="${cx}" cy="${cy}" r="3" fill="#333"/>`;
    html += `<text x="${cx}" y="18" text-anchor="middle" font-size="10" fill="red">restricted</text>`;
    const [st, sty] = polarToXY(cx, cy, r + 14, target);
    html += `<text x="${st}" y="${sty + 4}" text-anchor="middle" font-size="10" fill="#333">target</text>`;
    svg.innerHTML = html;
  }

  function checkAngleWarnings() {
    const tol = parseInt(document.getElementById('s_angle_tolerance').value);
    const dead = parseInt(document.getElementById('s_dead_angle').value);
    const slow = parseInt(document.getElementById('s_slow_angle').value);
    const w = [];
    if (tol >= dead) w.push('tolerance must be < dead angle');
    if (dead >= slow) w.push('dead angle must be < slow angle');
    document.getElementById('angleWarning').textContent = w.join('; ');
  }

  function checkPowerWarnings() {
    const cutoff = parseInt(document.getElementById('s_cutoff_pwm').value);
    const slow = parseInt(document.getElementById('s_slow_pwm').value);
    const fast = parseInt(document.getElementById('s_fast_pwm').value);
    const w = [];
    if (cutoff >= slow) w.push('cutoff must be < slow');
    if (slow >= fast) w.push('slow must be < fast');
    document.getElementById('powerWarning').textContent = w.join('; ');
  }

  function checkPwmRangeWarning() {
    const lo = parseInt(document.getElementById('s_pwm_low_limit').value);
    const hi = parseInt(document.getElementById('s_pwm_high_limit').value);
    document.getElementById('pwmRangeWarning').textContent =
        (lo >= hi) ? 'low limit must be < high limit' : '';
    document.getElementById('v_pwm_center').textContent = ((lo + hi) / 2) | 0;
    document.getElementById('v_pwm_range').textContent = ((hi - lo) / 2) | 0;
  }

  /* ---- Send params (throttled) ---- */
  function scheduleSend() {
    if (sendTimer || !device) return;
    sendTimer = setTimeout(async () => {
      sendTimer = null;
      if (!device) return;
      try {
        await device.transferOut(EP_OUT, new TextEncoder().encode(buildParamsText()));
      } catch (e) { console.error('Send error:', e); }
    }, 50);
  }

  /* ---- Slider/checkbox event wiring ---- */
  for (const f of SLIDER_FIELDS) {
    const s = document.getElementById('s_' + f);
    if (!s) continue;
    s.addEventListener('input', () => {
      updateDisplay(f, s.value);
      if (ANGLE_FIELDS.includes(f)) { drawAngleCircle(); checkAngleWarnings(); }
      if (POWER_FIELDS.includes(f)) { checkPowerWarnings(); }
      if (PWM_RANGE_FIELDS.includes(f)) { checkPwmRangeWarning(); }
      scheduleSend();
    });
  }
  document.getElementById('s_angle_reversed').addEventListener('change', () => scheduleSend());

  const mockCheckbox = document.getElementById('s_pwm_mock_enabled');
  const mockSlider = document.getElementById('s_pwm_mock');
  mockCheckbox.addEventListener('change', () => {
    mockSlider.disabled = !mockCheckbox.checked;
    scheduleSend();
  });
  mockSlider.addEventListener('input', () => {
    document.getElementById('v_pwm_mock').textContent = mockSlider.value;
    scheduleSend();
  });

  /* ---- Connection ---- */
  document.getElementById('btnConnect').addEventListener('click', async () => {
    try {
      device = await navigator.usb.requestDevice({ filters: [{ vendorId: VID, productId: PID }] });
      await device.open();
      if (device.configuration === null) await device.selectConfiguration(1);
      await device.claimInterface(INTERFACE);
      setConnected(true);
      appendLog('--- Connected ---');

      const result = await device.controlTransferIn({
        requestType: 'vendor', recipient: 'device',
        request: VENDOR_REQUEST_PARAMS, value: 0, index: 0
      }, 512);
      populateFromMap(parseParamsText(new TextDecoder().decode(result.data)));

      readLogLoop();
    } catch (e) {
      setStatus('Connection failed: ' + e.message);
      console.error(e);
    }
  });

  async function disconnect() {
    const dev = device;
    device = null;
    setConnected(false);
    if (dev) { try { await dev.close(); } catch (e) { /* ignore */ } }
    appendLog('--- Disconnected ---');
    setStatus('Disconnected');
  }

  document.getElementById('btnDisconnect').addEventListener('click', () => disconnect());

  document.getElementById('btnRestart').addEventListener('click', async () => {
    if (!device) return;
    try {
      await device.controlTransferOut({
        requestType: 'vendor', recipient: 'device',
        request: VENDOR_REQUEST_REBOOT, value: 0, index: 0
      });
    } catch (e) { /* device reboots */ }
    device = null;
    setConnected(false);
    appendLog('--- Restart requested ---');
    setStatus('Device restarting...');
  });

  document.getElementById('btnSave').addEventListener('click', async () => {
    if (!device) return;
    try {
      await device.controlTransferOut({
        requestType: 'vendor', recipient: 'device',
        request: VENDOR_REQUEST_SAVE, value: 0, index: 0
      });
      appendLog('--- Params saved to flash ---');
    } catch (e) {
      appendLog('--- Save failed: ' + e.message + ' ---');
    }
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    populateFromMap(DEFAULTS);
    scheduleSend();
  });

  navigator.usb.addEventListener('disconnect', (e) => {
    if (device && e.device === device) {
      device = null;
      setConnected(false);
      appendLog('--- Device unplugged ---');
      setStatus('Device unplugged');
    }
  });

  /* ---- Log ---- */
  document.getElementById('logToggle').addEventListener('click', () => {
    logBox.classList.toggle('collapsed');
  });

  function appendLog(text) {
    logLines.push(text);
    if (logLines.length > MAX_LOG_LINES) logLines.shift();
    logBox.textContent = logLines.join('\n');
    logBox.scrollTop = logBox.scrollHeight;
  }

  async function readLogLoop() {
    while (device) {
      try {
        const result = await device.transferIn(EP_IN, 256);
        appendLog(new TextDecoder().decode(result.data).trimEnd());
      } catch (e) {
        if (device) {
          appendLog('--- Connection lost ---');
          await disconnect();
        }
        break;
      }
    }
  }

  drawAngleCircle();
</script>
</body>
</html>
